<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<script>
    const API_URL = 'https://xai-fawn-delta.vercel.app/api/xai_chat';
    let SESSION_ID = localStorage.getItem('xai_session') || `sess_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
    localStorage.setItem('xai_session', SESSION_ID);
    
    const elements = {
        messages: document.getElementById('messages'),
        emptyState: document.getElementById('empty-state'),
        chatForm: document.getElementById('chat-form'),
        messageInput: document.getElementById('message-input'),
        sendBtn: document.getElementById('send-btn'),
        typing: document.getElementById('typing'),
        statusDot: document.getElementById('status-dot'),
        statusText: document.getElementById('status-text'),
        toast: document.getElementById('toast'),
        toastIcon: document.getElementById('toast-icon'),
        toastMsg: document.getElementById('toast-msg'),
        sessionDisplay: document.getElementById('session-display')
    };

    elements.sessionDisplay.textContent = SESSION_ID.substr(0, 16) + '...';

    // Configure marked
    marked.setOptions({
        breaks: true,
        gfm: true,
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
                try {
                    return hljs.highlight(code, { language: lang }).value;
                } catch (err) {}
            }
            return hljs.highlightAuto(code).value;
        }
    });

    function log(type, ...args) {
        console.log(`[XAI] ${type}`, ...args);
    }

    function showToast(msg, type = 'error') {
        const config = {
            error: { icon: 'fa-circle-exclamation', color: 'text-red-400' },
            success: { icon: 'fa-circle-check', color: 'text-green-400' },
            info: { icon: 'fa-circle-info', color: 'text-blue-400' }
        };
        elements.toastIcon.className = `fas ${config[type].icon} text-xl ${config[type].color}`;
        elements.toastMsg.textContent = msg;
        elements.toast.classList.remove('hidden');
        setTimeout(() => elements.toast.classList.add('hidden'), 3000);
    }

    function updateStatus(status) {
        const config = {
            online: { dot: 'status-online', text: 'En ligne', textColor: 'text-green-400' },
            offline: { dot: 'status-offline', text: 'Hors ligne', textColor: 'text-red-400' },
            unknown: { dot: 'status-unknown', text: 'Inconnu', textColor: 'text-slate-400' }
        };
        const c = config[status];
        elements.statusDot.className = `status-dot ${c.dot}`;
        elements.statusText.className = `text-xs sm:text-sm ${c.textColor}`;
        elements.statusText.textContent = c.text;
    }

    function getTimeString() {
        return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    function needsFrame(text) {
        // 1. Detect code blocks ```
        const hasCodeBlock = /```[\s\S]*?```/.test(text);
        
        // 2. Detect time patterns HH:MM or HHℎMM or HH:MM-HH:MM
        const timePattern = /\b\d{1,2}[h:]\d{0,2}\b|\b\d{1,2}:\d{2}\b/;
        const hasTime = timePattern.test(text);
        
        // 3. Detect keywords: agenda, devoir, cours, emploi du temps, planning, exercice
        const keywords = /\b(agenda|devoirs?|cours|emploi du temps|planning|exercice|tâches?|todo)\b/i;
        const hasKeyword = keywords.test(text);
        
        return hasCodeBlock || (hasTime && hasKeyword) || hasCodeBlock && hasKeyword;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function renderMarkdown(content) {
        const rawHtml = marked.parse(content);
        return DOMPurify.sanitize(rawHtml, {
            ALLOWED_TAGS: ['h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'p', 'br', 'strong', 'em', 'u', 's', 'code', 'pre', 'ul', 'ol', 'li', 'blockquote', 'a', 'table', 'thead', 'tbody', 'tr', 'th', 'td', 'hr'],
            ALLOWED_ATTR: ['href', 'class', 'target', 'rel']
        });
    }

    function addMessage(content, isUser = false) {
        elements.emptyState.classList.add('hidden');
        const msgDiv = document.createElement('div');
        msgDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} message-enter`;
        
        const timeStr = getTimeString();
        let processedContent;
        
        if (isUser) {
            processedContent = `<p class="whitespace-pre-wrap break-words">${escapeHtml(content)}</p>`;
        } else {
            const shouldFrame = needsFrame(content);
            const markdownHtml = renderMarkdown(content);
            
            if (shouldFrame) {
                // Message code/agenda/cours: encadré
                processedContent = `<div class="glass-strong rounded-xl p-4 my-2 border border-slate-600/50"><div class="markdown-content">${markdownHtml}</div></div>`;
            } else {
                // Message normal: pleine largeur du message-ai
                processedContent = `<div class="markdown-content">${markdownHtml}</div>`;
            }
        }
        
        msgDiv.innerHTML = `
            <div class="${isUser ? 'message-user' : 'message-ai'} rounded-2xl px-4 py-3 max-w-[85%] sm:max-w-[75%]">
                ${processedContent}
                <div class="text-xs ${isUser ? 'text-blue-100/70' : 'text-slate-400'} mt-2 text-right">${timeStr}</div>
            </div>
        `;
        elements.messages.appendChild(msgDiv);
        elements.messages.scrollTop = elements.messages.scrollHeight;
        
        // Highlight code blocks
        if (!isUser) {
            msgDiv.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        }
    }

    function setLoading(loading) {
        elements.messageInput.disabled = loading;
        elements.sendBtn.disabled = loading;
        elements.typing.classList.toggle('hidden', !loading);
        if (loading) elements.messages.scrollTop = elements.messages.scrollHeight;
    }

    async function loadHistory() {
        log('LOAD history', { url: API_URL, session: SESSION_ID });
        try {
            const res = await fetch(`${API_URL}?mode=history&session=${SESSION_ID}`, { method: 'GET' });
            log('RESPONSE', { status: res.status, ok: res.ok });
            
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            
            const data = await res.json();
            log('HISTORY DATA', data);
            updateStatus('online');
            
            if (data.messages && Array.isArray(data.messages) && data.messages.length > 0) {
                elements.messages.innerHTML = '';
                elements.emptyState.classList.add('hidden');
                data.messages.forEach(msg => {
                    addMessage(msg.content || msg.message || msg.text || '', msg.role === 'user');
                });
                updateHistoryModal(data.messages);
            }
        } catch (err) {
            log('ERROR', err);
            updateStatus('offline');
            showToast('Impossible de charger l\'historique', 'error');
        }
    }

    function updateHistoryModal(messages) {
        const content = document.getElementById('history-content');
        if (!messages || messages.length === 0) {
            content.innerHTML = `
                <div class="text-center text-slate-400 py-8">
                    <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                    <p>Aucun historique disponible</p>
                </div>
            `;
            return;
        }
        
        content.innerHTML = messages.map((msg, i) => `
            <div class="glass rounded-xl p-3 hover:bg-slate-700/50 transition-all">
                <div class="flex items-center gap-2 mb-2">
                    <i class="fas ${msg.role === 'user' ? 'fa-user text-blue-400' : 'fa-robot text-indigo-400'}"></i>
                    <span class="text-xs text-slate-400">${msg.role === 'user' ? 'Vous' : 'XAI'}</span>
                </div>
                <div class="text-sm text-slate-300 leading-relaxed ${msg.role === 'assistant' ? 'markdown-content' : ''}">${msg.role === 'assistant' ? renderMarkdown(msg.content || msg.message || msg.text || '') : escapeHtml(msg.content || msg.message || msg.text || '')}</div>
            </div>
        `).join('');
    }

    async function sendMessage(message) {
        log('POST', { message, session: SESSION_ID });
        setLoading(true);
        
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, session: SESSION_ID })
            });
            
            log('RESPONSE', { status: res.status, ok: res.ok });
            
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            
            const data = await res.json();
            log('DATA', data);
            updateStatus('online');
            
            const response = data.response || data.message || data.text || data.reply || 'Réponse reçue';
            addMessage(response, false);
            
        } catch (err) {
            log('ERROR', err);
            console.error('[XAI] ERROR', err);
            updateStatus('offline');
            showToast('Échec de l\'envoi du message', 'error');
            addMessage('❌ **Erreur**: Impossible de contacter le serveur', false);
        } finally {
            setLoading(false);
        }
    }

    elements.chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = elements.messageInput.value.trim();
        if (!message) return;
        
        addMessage(message, true);
        elements.messageInput.value = '';
        await sendMessage(message);
    });

    document.getElementById('btn-history').addEventListener('click', () => {
        document.getElementById('modal-history').classList.remove('hidden');
        document.getElementById('modal-history').classList.add('flex');
    });

    document.getElementById('btn-settings').addEventListener('click', () => {
        document.getElementById('modal-settings').classList.remove('hidden');
        document.getElementById('modal-settings').classList.add('flex');
    });

    document.getElementById('btn-pdf').addEventListener('click', () => {
        showToast('Fonction PDF à implémenter', 'info');
    });

    document.querySelectorAll('.modal-close').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.target.closest('.fixed').classList.add('hidden');
            e.target.closest('.fixed').classList.remove('flex');
        });
    });

    document.getElementById('clear-session').addEventListener('click', () => {
        if (confirm('Effacer la session actuelle ?')) {
            localStorage.removeItem('xai_session');
            location.reload();
        }
    });

    document.querySelectorAll('.modal-bg').forEach(modal => {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        });
    });

    // Init
    updateStatus('unknown');
    loadHistory();
</script>
